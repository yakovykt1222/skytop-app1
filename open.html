<!DOCTYPE html>

<meta charset="utf-8">
<title>Open VPN</title>
</head>

<body>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

if (key) {
    setTimeout(() => {
        window.location.href = key;
    }, 300);
} else {
    document.body.innerText = "Ключ не найден";
}
</script>

Открываем VPN...

</body>
