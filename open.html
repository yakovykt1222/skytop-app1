<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Opening VPN</title>
</head>

<body>

<script>

const params = new URLSearchParams(window.location.search);
const key = params.get("key");

if (key) {

    const link = document.createElement("a");
    link.href = key;
    document.body.appendChild(link);
    link.click();

}

</script>

Открываем VPN...

</body>
</html>
