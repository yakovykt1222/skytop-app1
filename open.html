<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Open VPN</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<p>Открываем VPN...</p>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

if (!key) {
    document.body.innerText = "Ключ не найден";
} else {

    // основной запуск
    window.location.href = key;

    // fallback для iOS
    setTimeout(() => {
        window.location = key;
    }, 700);

}
</script>

</body>
</html>
