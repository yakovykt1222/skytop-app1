<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Opening VPN</title>
</head>

<body style="background:#111;color:white;text-align:center;font-family:sans-serif;padding-top:40vh;">

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

if (key) {
    const encoded = encodeURIComponent(key);
    const url = "v2raytun://import/" + encoded;

    // основной способ
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = url;
    document.body.appendChild(iframe);

    // fallback
    setTimeout(() => {
        window.location.href = url;
    }, 800);
}
</script>
