<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Open VPN</title>
</head>

<body>

<p>Открываем VPN...</p>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

if (!key) {
    document.body.innerText = "Ключ не найден";
} else {

    // основной способ
    window.location.href = key;

    // повторная попытка для iOS
    setTimeout(() => {
        window.location = key;
    }, 500);

}
</script>

</body>
</html>
